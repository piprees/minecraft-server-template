# git-cliff configuration — generates changelogs from conventional commits.
# Used by release.yml (GitHub release body) and CHANGELOG.md.
[changelog]
header = "# Changelog\n\nAll notable changes to this project are documented in this file.\nGenerated by [git-cliff](https://git-cliff.org).\n\n"
body = """
## {{ version | default(value="Unreleased") }}{% if timestamp %} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
{% endfor %}
{% endfor -%}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI" },
  { message = "^refactor", group = "Changed" },
  { message = "^style", group = "Changed" },
  { message = "^perf", group = "Performance" },
  { message = "^chore", group = "Other" },
  { message = "^test", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"
