name: Release Bundle

# Cut a release: gh workflow run release.yml -f version=v1.2.3
#
# Builds the stack bundle, creates the release as a DRAFT with the assets
# attached, then publishes it. This is the only order that works with
# immutable releases (assets cannot be added after publish - and consumers
# get the supply-chain guarantee that a published bundle never changes).
# Publishing the draft fires the `release: published` event, which triggers
# publish.yml to build and tag the container images.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  smoke-test:
    name: Smoke test
    uses: ./.github/workflows/smoke-test.yml
    permissions:
      contents: read

  bundle:
    name: Build bundle and publish release
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate version
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be vX.Y.Z (got: ${{ inputs.version }})"
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'

      - name: Build in-house mods
        # Ship the REMAPPED jar from build/libs/ — never the -dev jar from
        # build/devlibs/. Dev jars use Yarn named mappings and carry no refmap,
        # so every mixin fails on a production server (intermediary names) and
        # the server crash-loops at boot.
        run: |
          mkdir -p dist/local-mods
          while IFS='|' read -r JAR_NAME PROJECT REF_MAP; do
            [[ -z "$JAR_NAME" || "$JAR_NAME" == \#* ]] && continue
            (
              cd "mods/$PROJECT"
              gradle build
              JAR=$(find build/libs -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar')
              cp "$JAR" "../../dist/local-mods/$JAR_NAME"
            )
          done < mods/local-mods.manifest

      - name: Verify mod JAR is remapped
        # Guards against the empty/unremapped jar failure mode: the jar must
        # contain compiled classes and the mixin refmap Loom generates during
        # remapping. An unremapped or empty jar ships a production crash loop.
        run: |
          while IFS='|' read -r JAR_NAME PROJECT REF_MAP; do
            [[ -z "$JAR_NAME" || "$JAR_NAME" == \#* ]] && continue
            JAR="dist/local-mods/$JAR_NAME"
            if ! unzip -l "$JAR" | grep -q "$REF_MAP"; then
              echo "::error::$JAR is missing $REF_MAP — remapJar produced an unremapped or empty jar"
              exit 1
            fi
            CLASSES=$(unzip -l "$JAR" | grep -c '\.class$' || true)
            if [[ "$CLASSES" -lt 10 ]]; then
              echo "::error::$JAR contains only $CLASSES classes — remapJar output looks empty"
              exit 1
            fi
          done < mods/local-mods.manifest

      - name: Build bundle
        run: ./scripts/build-stack-bundle.sh "${{ inputs.version }}"

      - name: Verify declared local mods are in the bundle
        run: |
          BUNDLE="dist/stack-${{ inputs.version }}.tar.gz"
          while IFS='|' read -r JAR_NAME PROJECT REF_MAP; do
            [[ -z "$JAR_NAME" || "$JAR_NAME" == \#* ]] && continue
            tar -tzf "$BUNDLE" | grep -qx "stack/local-mods/$JAR_NAME" \
              || { echo "::error::Bundle is missing $JAR_NAME"; exit 1; }
          done < mods/local-mods.manifest

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4.8.0
        with:
          version: v2.13.1
          args: --latest --strip header -o dist/RELEASE_NOTES.md

      - name: Fetch tags for changelog
        run: git fetch --tags --force

      - name: Generate full changelog
        # Must go through the action: git-cliff-action downloads the binary
        # into its own step and does NOT leave it on PATH — a bare git-cliff
        # in a run step fails with exit 127 (broke the first v3.1.0 cut).
        uses: orhun/git-cliff-action@v4.8.0
        with:
          version: v2.13.1
          args: -o CHANGELOG.md

      - name: Create draft release with assets, then publish
        run: |
          gh release create "${{ inputs.version }}" \
            dist/stack-*.tar.gz dist/stack-*.sha256 \
            --draft --notes-file dist/RELEASE_NOTES.md --target "${GITHUB_SHA}" \
            --title "${{ inputs.version }}"
          gh release edit "${{ inputs.version }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        # Best-effort AFTER the release is published: main can move during a
        # release (another merge landing mid-run made this push non-fast-
        # forward and failed the whole job — v3.1.0, 2026-07-22 — which
        # skipped the images job and shipped a release with no version-tagged
        # images). Rebase-and-retry, and never fail the job over a changelog.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md for ${{ inputs.version }}"
            for attempt in 1 2 3; do
              git push origin HEAD:main && break
              echo "push rejected (attempt $attempt) — rebasing onto moved main"
              git pull --rebase origin main
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Advance major tag
        # Also best-effort: consumers resolve symbolic pins via the releases
        # API, not this tag — it must never block the images job.
        continue-on-error: true
        run: |
          MAJOR=$(echo "${{ inputs.version }}" | grep -oE '^v[0-9]+')
          if [[ -n "$MAJOR" ]]; then
            git tag -f "$MAJOR" "${GITHUB_SHA}"
            git push origin "$MAJOR" --force
          fi

  # Rebuild all container images from this exact commit. publish.yml is
  # reusable (workflow_call); calling it here means the release run won't
  # complete until images are built — no more stale `latest` on deploy.
  # The push-to-main trigger on publish.yml also fires independently
  # (safety net for between-release fixes), but this is the authoritative
  # build for a release.
  images:
    name: Container images
    needs: bundle
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ inputs.version }}
    permissions:
      contents: read
      packages: write
