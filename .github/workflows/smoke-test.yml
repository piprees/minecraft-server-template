name: Smoke Test

# Boot the server with all mods, verify health and config correctness.
#
# Called by release.yml as a gate before publishing. Can also be run
# manually or on PRs that touch server-critical paths.
#
# Builds defaults-seed from source (single-platform), boots mc with the
# local profile, waits for RCON, and runs assertions. Mods are cached
# between runs to avoid Modrinth rate limits (~150 JARs).

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/**'
      - 'docker/defaults-seed/**'
      - 'docker-compose.yml'
      - 'scripts/deploy.sh'
      - 'scripts/lib.sh'

permissions:
  contents: read

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boot-test:
    name: Boot server and verify (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # default: full stack. removal: a representative consumer
        # overlay/mods-remove.txt (structure mods + BOTH worldgen mods the
        # noise presets used to depend on) — the regression net for the
        # optional-mods promise: every default mod must be removable
        # without breaking the boot.
        variant: [default, removal]
    env:
      VARIANT: ${{ matrix.variant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build defaults-seed image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/defaults-seed:ci \
            -f docker/defaults-seed/Dockerfile .

      - name: Create minimal .env
        run: |
          cat > .env <<'EOF'
          MC_VERSION=1.21.1
          MEMORY=4G
          SEED=0
          RCON_PASSWORD=smoketest
          SERVER_PORT=25577
          VOICE_PORT=24454
          MOTD=CI smoke test
          DOMAIN=example.com
          ONLINE_MODE=FALSE
          ENABLE_WHITELIST=FALSE
          ENFORCE_WHITELIST=FALSE
          IMAGE_TAG=ci
          EOF

      - name: Restore mod cache
        uses: actions/cache@v6
        with:
          path: data/mods
          # Variant-suffixed: the removal variant prunes jars from data/mods,
          # and a shared key would let it poison the default variant's cache.
          key: mc-mods-${{ hashFiles('config/modrinth-mods.txt') }}-${{ matrix.variant }}
          restore-keys: |
            mc-mods-${{ hashFiles('config/modrinth-mods.txt') }}-
            mc-mods-

      - name: Write consumer mods-remove overlay (removal variant)
        if: matrix.variant == 'removal'
        # Representative consumer removal set: three structure mods plus BOTH
        # worldgen mods the adventure:wide/compressed noise presets reference.
        # fabric-seasons-terralith-compat hard-depends on terralith, so a real
        # consumer removing terralith must remove it too — same here.
        run: |
          mkdir -p overlay
          cat > overlay/mods-remove.txt <<'EOF'
          when-dungeons-arise
          dungeons-and-taverns
          yungs-better-dungeons
          tectonic
          terralith
          fabric-seasons-terralith-compat
          EOF

      - name: Create bind-mount directories
        run: mkdir -p data/mods data/config modpack-dist overlay backups

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'

      - name: Build and install custom-dimensions mod
        # The remapped-jar checks mirror mod-build.yml: Gradle reports
        # BUILD SUCCESSFUL even when remapJar emits an empty/unremapped jar.
        working-directory: mods/custom-dimensions
        run: |
          gradle build -x test --no-daemon
          JAR=$(find build/libs -name 'customdimensions-*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar')
          if [[ -z "$JAR" ]]; then
            echo "::error::No remapped jar found in build/libs"
            exit 1
          fi
          unzip -l "$JAR" | grep -q 'customdimensions-refmap.json' || {
            echo "::error::$JAR is missing the refmap — unremapped or empty"
            exit 1
          }
          CLASSES=$(unzip -l "$JAR" | grep -c '\.class$' || true)
          [[ "$CLASSES" -ge 10 ]] || { echo "::error::only $CLASSES classes in $JAR"; exit 1; }
          cp "$JAR" ../../data/mods/customdimensions.jar
          echo "Installed $JAR ($CLASSES classes)"

      - name: Install worldgen configs (dimension fixture + tectonic + c2me)
        # A REDUCED v4 config directory: booting all 74 dimensions is too
        # heavy for a CI runner. Two shipped dimension files prove the
        # directory loader; two smoke-only files exercise the noiseSettings
        # presets (adventure:wide / adventure:compressed) baked into the jar.
        run: |
          python3 - <<'EOF'
          import json, os, shutil
          base = 'data/config/custom-dimensions'
          shutil.rmtree(base, ignore_errors=True)
          os.makedirs(base + '/dimensions', exist_ok=True)
          shutil.copy('config/custom-dimensions/settings.json', base + '/settings.json')
          keep = ['the_claymarsh', 'the_blossom_gardens']
          for slug in keep:
              shutil.copy(f'config/custom-dimensions/dimensions/{slug}.json',
                          f'{base}/dimensions/{slug}.json')
          smoke = {
              'the_smoke_wide': {"type": "overworld", "seed": 1111,
                                 "noiseSettings": "adventure:wide"},
              'the_smoke_compressed': {"type": "overworld", "seed": 2222,
                                       "noiseSettings": "adventure:compressed",
                                       "structureDensity": "dense"},
          }
          for slug, cfg in smoke.items():
              json.dump(cfg, open(f'{base}/dimensions/{slug}.json', 'w'), indent=2)
              keep.append(slug)
          print('fixture dimensions:', keep)
          EOF
          cp config/tectonic.json data/config/tectonic.json
          # c2me DFC off — per-dimension seeds silently clone the main world
          # otherwise (mods/AGENTS.md); mirrors deploy.sh 8c / dev-up.sh.
          printf '[vanillaWorldGenOptimizations]\n\tuseDensityFunctionCompiler = false\n' > data/config/c2me.toml

      - name: Install platform datapacks and filter for removed mods
        # Mirrors dev-up.sh/deploy.sh: platform datapacks into the world dir,
        # then ownership-based filtering strips override files owned by
        # removed mods. Without the filter the removal variant's structures
        # pack would reference absent structure sets — a registry-load boot
        # break, which is exactly the regression this variant guards.
        run: |
          mkdir -p data/world/datapacks
          for pack in config/datapacks/*/; do
            cp -r "$pack" "data/world/datapacks/$(basename "$pack")"
          done
          python3 scripts/filter-datapacks.py data/world/datapacks \
            config/modrinth-mods.txt overlay

      - name: Start seed and sync mods (offline-by-default boots)
        # MODS_FILE is empty by default, so mc makes no network requests at
        # boot — missing jars are fetched host-side from the seed's resolved
        # URL lists, exactly like dev-up.sh/deploy.sh. On an actions/cache
        # hit this downloads nothing.
        run: |
          docker compose --profile local up -d seed
          docker wait seed
          ./scripts/sync-mods.sh "$PWD/data"

      - name: Prune jars removed by the overlay
        # The mod cache restores ALL default jars; sync-mods only adds. In
        # production dev-up.sh/deploy.sh prune against the seed's manifest —
        # mirror that, or the removal variant boots WITH the removed mods.
        run: |
          VOL=$(docker volume ls -q | grep 'stack-mods$' | head -1)
          MANIFEST=$(docker run --rm -v "$VOL":/m:ro alpine cat /m/mods-manifest.txt)
          PRUNED=0
          for jar in data/mods/*.jar; do
            [ -f "$jar" ] || continue
            base=$(basename "$jar")
            [ "$base" = "customdimensions.jar" ] && continue
            if ! grep -qxF "$base" <<< "$MANIFEST"; then
              rm -f "$jar"; PRUNED=$((PRUNED+1)); echo "  pruned: $base"
            fi
          done
          echo "pruned $PRUNED jar(s)"

      - name: Start mc
        run: |
          docker compose --profile local up -d mc

      - name: Wait for server to become healthy
        run: |
          echo "Waiting for RCON (up to 600s for first-run mod download)..."
          ELAPSED=0
          INTERVAL=15
          MAX_WAIT=600
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if docker exec mc rcon-cli "list" 2>/dev/null | grep -q "players online"; then
              echo "Server is healthy (took ${ELAPSED}s)"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            echo "  ...waiting (${ELAPSED}s / ${MAX_WAIT}s)"
            # Show last few log lines for progress visibility
            docker logs mc --tail 3 2>/dev/null || true
          done
          echo "::error::Server failed to become healthy within ${MAX_WAIT}s"
          docker logs mc --tail 100
          exit 1

      - name: Assert RCON responds
        run: |
          RESULT=$(docker exec mc rcon-cli "list" 2>/dev/null)
          echo "$RESULT"
          echo "$RESULT" | grep -q "players online" || {
            echo "::error::RCON 'list' did not return expected output"
            exit 1
          }

      - name: Assert custom dimensions, noise presets and tectonic config
        run: |
          LOG=$(docker logs mc 2>&1)

          # Tectonic parses config/tectonic.json SILENTLY — a malformed file
          # logs one line and falls back to factory defaults. Fail loudly here.
          # (default variant only: the removal variant has no Tectonic)
          if [[ "$VARIANT" == "default" ]] && grep -qiF -- "Couldn't load tectonic config" <<<"$LOG"; then
            echo "::error::Tectonic fell back to factory defaults — config/tectonic.json failed to parse"
            exit 1
          fi

          # Boot-time dimension creation from the fixture config.
          for dim in the_claymarsh the_blossom_gardens the_smoke_wide the_smoke_compressed; do
            OUT=$(docker exec mc rcon-cli "execute in adventure:$dim run seed" 2>&1 || true)
            echo "seed($dim): $OUT"
            echo "$OUT" | grep -q "Seed" || {
              echo "::error::Dimension adventure:$dim missing or seed query failed"
              exit 1
            }
          done

          # Per-dimension seed mixin oracle: the reported seed must be the
          # config seed, not the world seed (c2me DFC trap in mods/AGENTS.md).
          docker exec mc rcon-cli "execute in adventure:the_smoke_wide run seed" | grep -q "1111" || {
            echo "::error::the_smoke_wide reports the wrong seed — per-dimension seed mixin broken"
            exit 1
          }

          # noiseSettings resolution (registry lookup of the jar-baked presets).
          grep -qF -- "Dimension the_smoke_wide uses noise settings adventure:wide" <<<"$LOG" || {
            echo "::error::noiseSettings adventure:wide was not applied"
            exit 1
          }
          grep -qF -- "Dimension the_smoke_compressed uses noise settings adventure:compressed" <<<"$LOG" || {
            echo "::error::noiseSettings adventure:compressed was not applied"
            exit 1
          }
          if grep -qF -- "not found in the noise_settings registry" <<<"$LOG"; then
            echo "::error::a noiseSettings id failed registry lookup"
            exit 1
          fi

          # Per-dimension structure control: the fixture gives
          # the_smoke_compressed structureDensity=dense, and
          # the_blossom_gardens is peaceful (hostileSpawning:false).
          grep -qF -- "Dimension the_smoke_compressed structure profile: density=dense" <<<"$LOG" || {
            echo "::error::structureDensity=dense was not applied to the_smoke_compressed"
            exit 1
          }
          grep -qF -- "Dimension the_blossom_gardens structure profile: density=normal+peaceful" <<<"$LOG" || {
            echo "::error::peaceful structure overlay was not applied to the_blossom_gardens"
            exit 1
          }
          grep -qE -- "Loaded .* structure-set themes" <<<"$LOG" || {
            echo "::error::structure theme map failed to load from the jar"
            exit 1
          }

          # Height-limit oracle: tectonic max_y=448 must raise the overworld
          # dimension type to height 512 (tectonic:set_height_limits). A
          # silent tectonic-config failure leaves it 384 and this setblock
          # fails. Run in a custom dim to confirm the patched type is shared.
          # setblock does not load chunks ("That position is not loaded") —
          # forceload first and give async chunk gen a few tries.
          # (default only: without Tectonic the type keeps vanilla height 384)
          if [[ "$VARIANT" != "default" ]]; then
            echo "Custom dimensions + noise presets verified (removal variant skips the height oracle)"
            exit 0
          fi
          docker exec mc rcon-cli "execute in adventure:the_smoke_wide run forceload add 8 8" || true
          SB=""
          for attempt in 1 2 3 4 5 6; do
            sleep 5
            SB=$(docker exec mc rcon-cli "execute in adventure:the_smoke_wide run setblock 8 440 8 minecraft:stone" 2>&1 || true)
            echo "setblock@y440 (attempt $attempt): $SB"
            echo "$SB" | grep -qi "changed the block" && break
          done
          docker exec mc rcon-cli "execute in adventure:the_smoke_wide run forceload remove 8 8" || true
          echo "$SB" | grep -qi "changed the block" || {
            echo "::error::Cannot place a block at y=440 — tectonic height limits not applied (output: $SB)"
            exit 1
          }
          echo "Custom dimensions + noise presets verified"

      - name: Assert removed mods are gone and locate fails cleanly (removal variant)
        if: matrix.variant == 'removal'
        run: |
          # 1. The removed jars must actually be absent.
          PRESENT=$(ls data/mods/ | grep -icE 'tectonic|terralith|dungeons.arise|dungeons.and.taverns|betterdungeons|YungsBetterDungeons' || true)
          if [ "$PRESENT" -gt 0 ]; then
            echo "::error::removed mod jar(s) still present in data/mods:"
            ls data/mods/ | grep -iE 'tectonic|terralith|dungeons' || true
            exit 1
          fi
          echo "removed jars absent from data/mods"

          # 2. /locate for a removed set's structure must fail CLEANLY: an
          # unknown-id error back over RCON, server still healthy after.
          OUT=$(docker exec mc rcon-cli "execute in adventure:the_claymarsh run locate structure when_dungeons_arise:mining_system" 2>&1 || true)
          echo "locate(removed structure): $OUT"
          if echo "$OUT" | grep -qi "is at"; then
            echo "::error::locate found a structure from a removed mod"
            exit 1
          fi
          docker exec mc rcon-cli "list" | grep -q "players online" || {
            echo "::error::server unresponsive after locate of a removed structure"
            exit 1
          }
          echo "clean locate failure, server healthy"

          # 3. The ownership filter must have stripped the removed mods'
          # structure_set overrides from the world datapack.
          LEFT=$(find data/world/datapacks/structures -path '*dungeons_arise*' -o -path '*betterdungeons*' 2>/dev/null | wc -l)
          if [ "$LEFT" -gt 0 ]; then
            echo "::error::filter-datapacks.py left override files for removed mods"
            find data/world/datapacks/structures -path '*dungeons_arise*' -o -path '*betterdungeons*'
            exit 1
          fi
          echo "ownership filtering verified"

      - name: Assert starterkit config is bundle version (not mod default)
        if: matrix.variant == 'default'
        run: |
          # The seed container writes configs to /config-vol/ (stack-config volume).
          # deploy.sh copies these to /data/config/ on production; in CI we check
          # the volume directly since deploy.sh doesn't run.
          KIT=$(docker exec mc cat /config-vol/starterkit/kits/Default.txt 2>/dev/null || true)
          if echo "$KIT" | grep -q "diamond_helmet"; then
            echo "Starterkit: bundle version applied (diamond armour)"
          elif [ -z "$KIT" ]; then
            echo "::error::Starterkit config not found in seed volume"
            exit 1
          else
            echo "::error::Starterkit config is the mod default, not the bundle version"
            echo "$KIT" | head -5
            exit 1
          fi

      - name: Restore Carpet mod cache
        if: matrix.variant == 'default'
        uses: actions/cache@v6
        with:
          path: .cache/carpet-ci.jar
          key: carpet-1.21-1.4.147-v240613

      - name: Download Carpet mod (cache miss only)
        if: matrix.variant == 'default'
        run: |
          if [[ ! -f .cache/carpet-ci.jar ]]; then
            mkdir -p .cache
            CARPET_URL="https://cdn.modrinth.com/data/TQTTVgYE/versions/f2mvlGrg/fabric-carpet-1.21-1.4.147%2Bv240613.jar"
            curl -sL -o .cache/carpet-ci.jar "$CARPET_URL"
          fi

      - name: Spawn a fake player (Carpet bot) and verify world generation
        if: matrix.variant == 'default'
        run: |
          echo "Installing Carpet for fake-player support..."
          docker cp .cache/carpet-ci.jar mc:/data/mods/carpet-ci.jar
          # Full stop+start (not restart): the itzg entrypoint re-scans
          # /data/mods/ on start, and Fabric rebuilds its mod list. A plain
          # restart reuses the cached mod list from the first boot.
          docker stop mc
          docker start mc

          echo "Waiting for server to become healthy with Carpet..."
          CARPET_ELAPSED=0
          while [ $CARPET_ELAPSED -lt 300 ]; do
            if docker exec mc rcon-cli "list" 2>/dev/null | grep -q "players online"; then
              echo "Server healthy with Carpet (took ${CARPET_ELAPSED}s)"
              break
            fi
            sleep 15
            CARPET_ELAPSED=$((CARPET_ELAPSED + 15))
          done
          if [ $CARPET_ELAPSED -ge 300 ]; then
            echo "::error::Server did not recover after Carpet install"
            docker logs mc --tail 30
            exit 1
          fi

          echo "Enabling Carpet player command and spawning bot..."
          docker exec mc rcon-cli "carpet commandPlayer true" || true
          sleep 3
          SPAWN_RESULT=$(docker exec mc rcon-cli "player SmokeBot spawn" 2>&1 || true)
          echo "Spawn command result: $SPAWN_RESULT"

          # Carpet bot spawn is async — wait up to 30s for it to appear.
          # CI runners are slow and spawn chunks may still be generating.
          BOT_FOUND=0
          for attempt in $(seq 1 6); do
            sleep 5
            ONLINE=$(docker exec mc rcon-cli "list" 2>/dev/null || echo "")
            echo "Player list (attempt $attempt): $ONLINE"
            if echo "$ONLINE" | grep -q "SmokeBot"; then
              BOT_FOUND=1
              break
            fi
          done
          if [ $BOT_FOUND -eq 0 ]; then
            echo "::error::Carpet bot SmokeBot did not appear in player list after 30s"
            echo "Checking if Carpet loaded..."
            docker exec mc rcon-cli "carpet" 2>&1 || echo "(carpet command not found — mod may not have loaded)"
            docker logs mc --tail 30
            exit 1
          fi

          echo "Verifying bot is in the overworld with valid coordinates..."
          DIM=$(docker exec mc rcon-cli "data get entity SmokeBot Dimension" 2>/dev/null || echo "")
          POS=$(docker exec mc rcon-cli "data get entity SmokeBot Pos" 2>/dev/null || echo "")
          echo "Dimension: $DIM"
          echo "Position: $POS"
          echo "$DIM" | grep -q "overworld" || {
            echo "::error::Bot not in overworld: $DIM"
            exit 1
          }

          echo "Checking for world generation (region files exist)..."
          REGIONS=$(docker exec mc find /data/world/region -name '*.mca' 2>/dev/null | head -1)
          if [ -n "$REGIONS" ]; then
            echo "Region files present — world generated"
          else
            echo "::error::No region files found — world was not generated"
            exit 1
          fi

          echo "Checking mc logs for errors after player join..."
          ERRORS=$(docker logs mc 2>&1 | grep -ciE "FATAL|ClassCastException|MixinApplyError" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::$ERRORS critical error(s) found in logs after bot join"
            docker logs mc 2>&1 | grep -iE "FATAL|ClassCastException|MixinApplyError" | head -10
          fi

          echo "Cleaning up bot..."
          docker exec mc rcon-cli "player SmokeBot kill" || true
          docker exec mc rm -f /data/mods/carpet-ci.jar || true
          echo "Fake player test passed"

      - name: Assert no crash reports
        run: |
          if [ -d data/crash-reports ] && [ "$(ls -A data/crash-reports 2>/dev/null)" ]; then
            echo "::error::Crash reports found:"
            ls data/crash-reports/
            cat data/crash-reports/*.txt | head -50
            exit 1
          fi
          echo "No crash reports"

      - name: Assert key configs seeded
        run: |
          MISSING=0
          for cfg in \
            starterkit.json5 \
            starterkit/kits/Default.txt \
            starterkit/descriptions/Default.txt \
            boring_default_game_rules/config.json \
            voicechat/voicechat-server.properties; do
            if docker exec mc test -f "/config-vol/$cfg"; then
              echo "  OK: $cfg"
            else
              echo "::error::Missing config in seed volume: $cfg"
              MISSING=$((MISSING + 1))
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== mc logs (last 200) ==="
          docker logs mc --tail 200 2>&1 || true
          echo "=== seed logs ==="
          docker logs seed 2>&1 || true
          echo "=== container status ==="
          docker ps -a

      - name: Stop stack
        if: always()
        run: docker compose --profile local down -v
