name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  commit-messages:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate conventional commit format
        run: |
          ERRORS=0
          BASE="${{ github.event.pull_request.base.sha }}"
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE '^(feat|fix|docs|ci|chore|refactor|style|perf|test|build|revert)(\(.+\))?!?: .+'; then
              echo "::warning::Non-conventional commit: $msg"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git log --format='%s' "$BASE"..HEAD)
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Commits should follow conventional format: type: description"
            echo "  e.g. feat: add rollback command"
            echo "  e.g. fix: handle RCON timeout during autopause"
            echo ""
            echo "Valid types: feat, fix, docs, ci, chore, refactor, style, perf, test, build, revert"
            echo ""
            echo "Non-conventional commits won't appear in the auto-generated changelog."
            echo "This is a warning, not a blocker — the maintainer may squash-merge with a conventional message."
          fi

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run ShellCheck on all scripts
        run: |
          find scripts docker examples/consumer -type f \( -name '*.sh' -o -name dev -o -name ops \) -print0 \
            | xargs -0 shellcheck --severity=warning
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml docker-compose.yml .github/workflows/*.yml config/cloudflared/config.yml

  compose-validate:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create minimal .env for validation
        run: |
          cat > .env <<'EOF'
          MC_VERSION=1.21.1
          MEMORY=4G
          SEED=0
          RCON_PASSWORD=dummy
          SERVER_PORT=25577
          VOICE_PORT=24454
          MOTD=CI validation
          DOMAIN=example.com
          ONLINE_MODE=FALSE
          ENABLE_WHITELIST=FALSE
          ENFORCE_WHITELIST=FALSE
          R2_ACCOUNT_ID=dummy
          R2_BUCKET=dummy
          R2_ACCESS_KEY_ID=dummy
          R2_SECRET_ACCESS_KEY=dummy
          RESTIC_PASSWORD=dummy
          DISCORD_BOT_TOKEN=dummy
          DISCORD_GUILD_ID=dummy
          DISCORD_CHANNEL_ID=dummy
          DISCORD_WEBHOOK_URL=https://example.com
          KUMA_API_KEY=dummy
          EOF

      - name: Validate local profile
        run: |
          if ! docker compose --profile local config > /dev/null 2> compose-err.txt; then
            echo "::error::Compose validation failed for local profile"
            cat compose-err.txt
            echo ""
            echo "Validation uses a synthetic .env (see step above). If your change adds a new required variable, add it there too."
            exit 1
          fi

      - name: Validate cloud profile
        run: |
          if ! docker compose --profile cloud config > /dev/null 2> compose-err.txt; then
            echo "::error::Compose validation failed for cloud profile"
            cat compose-err.txt
            echo ""
            echo "Validation uses a synthetic .env (see step above). If your change adds a new required variable, add it there too."
            exit 1
          fi

  bundle-manifest:
    name: Bundle manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check all ops/dev commands resolve to manifest entries
        run: |
          MANIFEST=$(grep -oE "scripts/[^ \")]+\.sh" scripts/build-stack-bundle.sh | sort -u)
          ERRORS=0

          # Build the resolved script list from the ops case statement.
          # Each explicit script_file="X" mapping, plus every ALLOWED_COMMANDS
          # entry that has no mapping (defaults to the command name itself).
          MAPPED=$(grep -oE 'script_file="[^"]+"' examples/consumer/ops \
            | sed 's/script_file="//;s/"//' | grep -v '^\$' | sort -u)

          # Commands with explicit mappings
          for script in $MAPPED; do
            target="scripts/${script}.sh"
            if ! echo "$MANIFEST" | grep -qF "$target"; then
              echo "::error::ops script_file='$script' maps to $target which is missing from build-stack-bundle.sh MANIFEST"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Commands that use the default (script_file="$CMD" -> command name)
          # Extract ALLOWED_COMMANDS entries, subtract those with explicit mappings
          ALLOWED=$(sed -n '/ALLOWED_COMMANDS=(/,/)/p' examples/consumer/ops \
            | grep -oE '[a-z][-a-z]*' | sort -u)
          # Commands that have a case mapping (the left side of the =>)
          CASE_CMDS=$(grep -oE '[a-z|][-a-z|]*\)' examples/consumer/ops \
            | tr '|)' '\n' | grep -v '^$' | sort -u)

          # Commands handled inline (if/then before the case block) rather
          # than via a script_file mapping — they never hit the resolver.
          INLINE_HANDLED="sync"

          for cmd in $ALLOWED; do
            # Skip commands that have an explicit case mapping (already checked via MAPPED)
            if echo "$CASE_CMDS" | grep -qxF "$cmd"; then
              continue
            fi
            # Skip commands handled inline in ops (not delegated to a script)
            if echo "$INLINE_HANDLED" | grep -qwF "$cmd"; then
              continue
            fi
            target="scripts/${cmd}.sh"
            if ! echo "$MANIFEST" | grep -qF "$target"; then
              echo "::error::ops command '$cmd' has no case mapping and scripts/${cmd}.sh is missing from build-stack-bundle.sh MANIFEST"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Every script sourced/exec'd by bundle scripts should be in the manifest
          for script in $(echo "$MANIFEST" | grep '^scripts/'); do
            if [ -f "$script" ]; then
              for ref in $(grep -oE '\$SCRIPT_DIR/[a-z][-a-z]*\.sh' "$script" 2>/dev/null \
                | sed 's|\$SCRIPT_DIR/||' || true); do
                target="scripts/$ref"
                if [ -f "$target" ] && ! echo "$MANIFEST" | grep -qF "$target"; then
                  echo "::error::$script references $target which is missing from build-stack-bundle.sh MANIFEST"
                  ERRORS=$((ERRORS + 1))
                fi
              done
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Add missing scripts to the MANIFEST array in scripts/build-stack-bundle.sh"
            exit 1
          fi
          echo "All bundle script references resolved"

  pip-check:
    name: Python deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install and verify dependencies
        run: pip install -r scripts/requirements-discord-sync.txt

      - name: Check for conflicts
        run: pip check

  ci-help:
    name: CI guidance
    runs-on: ubuntu-latest
    if: failure()
    needs: [shellcheck, yamllint, compose-validate, bundle-manifest, pip-check]
    steps:
      - name: Post failure guidance
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## CI failed — here's what to do

          1. Fix the issues flagged above (click the annotations for exact locations).
          2. Push again — CI re-runs automatically on every push to this PR.
          3. If you're stuck, comment on the PR and a maintainer will help.

          Quick local check: `./scripts/test-scripts.sh --quick`
          EOF
