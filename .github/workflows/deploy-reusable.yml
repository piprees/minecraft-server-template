name: Deploy

on:
  workflow_call:
    inputs:
      stack_version:
        required: true
        type: string
      environment:
        type: string
        default: production
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      RCON_PASSWORD:
        required: true
      DISCORD_BOT_TOKEN:
        required: true
      DISCORD_CHANNEL_ID:
        required: true
      DISCORD_CHAT_CHANNEL_ID:
        required: false
      DISCORD_GUILD_ID:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_BUCKET:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      RESTIC_PASSWORD:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_ZONE_ID:
        required: true
      CLOUDFLARE_TUNNEL_ID:
        required: false
      KUMA_API_KEY:
        required: false
      KUMA_PASSWORD:
        required: false

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    # Full deploys legitimately run 3-15 min (countdown + mod re-sync +
    # ~150-mod boot + setup-dimensions over RCON). 10 min killed deploy.sh
    # mid-run twice on 2026-07-12, stranding the server between restart and
    # the post-boot setup steps.
    timeout-minutes: 30
    if: vars.DROPLET_HOST != ''
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set commit metadata
        id: meta
        run: |
          MSG=$(git log -1 --pretty=format:'%s' | head -c 200)
          SHA=$(git log -1 --pretty=format:'%h')
          {
            echo "msg=${MSG}"
            echo "sha=${SHA}"
            echo "full_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Keepalives for every ssh/scp/rsync in this job: a full deploy has
          # long QUIET stretches (image pull with mc stopped) and an idle NAT
          # path killed the session mid-deploy (exit 255, 2026-07-11) —
          # leaving the server down with the whitelist cleared.
          printf 'Host *\n  ServerAliveInterval 30\n  ServerAliveCountMax 10\n' >> ~/.ssh/config
          ssh-keyscan -H ${{ vars.DROPLET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Resolve stack version
        id: stack
        # inputs.stack_version is usually SYMBOLIC ("v2", "latest") — it
        # resolves to a different concrete release over time. Tier detection
        # must compare concrete tags, or a platform release never registers
        # as a change (symbolic == symbolic forever, the historical bug that
        # made consumer pushes always land in pull tier). Resolution mirrors
        # stack-pull.sh: highest semver release matching the pin.
        env:
          GH_TOKEN: ${{ github.token }}
          PIN: ${{ inputs.stack_version }}
        run: |
          pin="${PIN#v}"
          tags=$(gh api /repos/piprees/minecraft-server-template/releases --paginate \
            --jq '.[].tag_name' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -t. -k1,1nr -k2,2nr -k3,3nr)
          if [[ -z "$pin" || "$pin" == "latest" ]]; then
            resolved=$(head -1 <<< "$tags")
          elif [[ "$pin" == *.*.* ]]; then
            resolved=$(grep -xF "$pin" <<< "$tags" | head -1)
          else
            resolved=$(grep -E "^${pin//./\\.}\." <<< "$tags" | head -1)
          fi
          if [[ -z "$resolved" ]]; then
            echo "::error::No platform release matches STACK_VERSION=${PIN}"
            exit 1
          fi
          echo "resolved=v${resolved}" >> "$GITHUB_OUTPUT"
          echo "Stack pin '${PIN}' resolved to v${resolved}"

      - name: Determine deploy tier
        id: tier
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }}"
          RESOLVED="${{ steps.stack.outputs.resolved }}"

          # Manual dispatch and releases always get a full deploy
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "release" ]]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (manual/release trigger)"
            exit 0
          fi

          # Read the deployed state file
          DEPLOYED=$($SSH "cat ~/server/.deployed 2>/dev/null" || echo "")
          DEPLOYED_SHA=$(echo "$DEPLOYED" | grep '^consumer_sha=' | head -1)
          DEPLOYED_SHA="${DEPLOYED_SHA#consumer_sha=}"

          if [[ -z "$DEPLOYED_SHA" ]]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (no state file — first deploy)"
            exit 0
          fi

          # Self-heal: a state file with no running stack means a previous
          # deploy died after writing state (or the server was rebuilt).
          # Trusting the sha here would downgrade to pull/infra and leave
          # the server empty while CI reports success.
          MC_PRESENT=$($SSH "docker ps -a --format '{{.Names}}' 2>/dev/null" | grep -cx mc || true)
          if [[ "$MC_PRESENT" == "0" ]]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (state file present but no mc container — recovering)"
            exit 0
          fi

          # Compare the resolved incoming tag against the bundle the server
          # is ACTUALLY running (the .stack/current symlink target) — not a
          # recorded string, which can go stale or stay symbolic. Any stack
          # change is a full deploy: bundle contents (scripts, configs,
          # default mods, images) all ride on the version.
          RUNNING_STACK=$($SSH 'basename "$(readlink ~/server/.stack/current)" 2>/dev/null' || echo "")
          if [[ "$RUNNING_STACK" != "$RESOLVED" ]]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (stack ${RUNNING_STACK:-none} → ${RESOLVED})"
            exit 0
          fi

          # Diff consumer commits since last deploy
          CHANGED=$(git diff --name-only "$DEPLOYED_SHA" HEAD 2>/dev/null || echo "FORCE")
          if [[ "$CHANGED" == "FORCE" ]]; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (cannot determine diff)"
            exit 0
          fi

          echo "Changed files:"
          while IFS= read -r f; do echo "  $f"; done <<< "$CHANGED"

          FULL_PATTERNS="^overlay/config/|^overlay/mods-extra\.txt$|^overlay/mods-remove\.txt$"
          if echo "$CHANGED" | grep -qE "$FULL_PATTERNS"; then
            echo "tier=full" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: full (mc-affecting files changed)"
            exit 0
          fi

          # Patterns requiring infra deploy (sidecars only, mc untouched)
          if echo "$CHANGED" | grep -qE "^overlay/"; then
            echo "tier=infra" >> "$GITHUB_OUTPUT"
            echo "Deploy tier: infra (overlay changes, no mc restart)"
            exit 0
          fi

          echo "tier=pull" >> "$GITHUB_OUTPUT"
          echo "Deploy tier: pull (no server changes needed)"

      - name: Notify Discord (starting)
        if: steps.tier.outputs.tier != 'pull'
        env:
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_ICON_URL: ${{ vars.BRAND_ICON_URL }}
        run: |
          TIER="${{ steps.tier.outputs.tier }}"
          SHA="${{ steps.meta.outputs.sha }}"
          MSG="${{ steps.meta.outputs.msg }}"
          JQ_ARGS=(--arg c "Deploying **${TIER}** (\`${SHA}\`: ${MSG})")
          JQ_EXPR='{content: $c}'
          if [[ -n "$BRAND_NAME" ]]; then
            JQ_ARGS+=(--arg u "$BRAND_NAME"); JQ_EXPR="${JQ_EXPR%\}}, username: \$u}"
          fi
          if [[ -n "$BRAND_ICON_URL" ]]; then
            JQ_ARGS+=(--arg a "$BRAND_ICON_URL"); JQ_EXPR="${JQ_EXPR%\}}, avatar_url: \$a}"
          fi
          jq -n "${JQ_ARGS[@]}" "$JQ_EXPR" \
            | curl -sf -H "Content-Type: application/json" -d @- \
              "${{ secrets.DISCORD_WEBHOOK_URL }}" || true

      - name: Generate server .env
        if: steps.tier.outputs.tier == 'full'
        # Values flow through env: so arbitrary content can't break the shell,
        # and every line is written single-quoted (embedded ' mapped to ’) so
        # the file parses identically under bash `source` and compose's
        # env-file reader. An unquoted MOTD with spaces once executed itself
        # as a command on the server.
        env:
          V_BRAND_NAME: ${{ vars.BRAND_NAME }}
          V_BRAND_SLUG: ${{ vars.BRAND_SLUG }}
          V_MOTD: ${{ vars.MOTD }}
          V_DISCORD_INVITE_URL: ${{ vars.DISCORD_INVITE_URL }}
          V_MC_VERSION: ${{ vars.MC_VERSION }}
          V_SEED: ${{ vars.SEED }}
          V_DOMAIN: ${{ vars.DOMAIN }}
          V_SERVER_PORT: ${{ vars.SERVER_PORT }}
          V_MEMORY: ${{ vars.MEMORY }}
          V_VIEW_DISTANCE: ${{ vars.VIEW_DISTANCE }}
          V_SIMULATION_DISTANCE: ${{ vars.SIMULATION_DISTANCE }}
          V_SPAWN_X: ${{ vars.SPAWN_X }}
          V_SPAWN_Y: ${{ vars.SPAWN_Y }}
          V_SPAWN_Z: ${{ vars.SPAWN_Z }}
          V_PREGEN_BORDER_RADIUS: ${{ vars.PREGEN_BORDER_RADIUS }}
          V_PLAYER_BORDER_RADIUS: ${{ vars.PLAYER_BORDER_RADIUS }}
          V_BACKUP_INTERVAL: ${{ vars.BACKUP_INTERVAL }}
          V_CLOUD_PROVIDER: ${{ vars.CLOUD_PROVIDER }}
          V_IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          V_STACK_VERSION: ${{ inputs.stack_version }}
          V_BRAND_ICON_URL: ${{ vars.BRAND_ICON_URL }}
          V_DISCORD_ADMIN_ROLE_ID: ${{ vars.DISCORD_ADMIN_ROLE_ID }}
          V_DISCORD_PLAYER_ROLE_ID: ${{ vars.DISCORD_PLAYER_ROLE_ID }}
          S_RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
          S_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          S_R2_BUCKET: ${{ secrets.R2_BUCKET }}
          S_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          S_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S_RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          S_DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          S_DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          S_DISCORD_CHAT_CHANNEL_ID: ${{ secrets.DISCORD_CHAT_CHANNEL_ID }}
          S_DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          S_DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          S_KUMA_API_KEY: ${{ secrets.KUMA_API_KEY }}
          S_KUMA_PASSWORD: ${{ secrets.KUMA_PASSWORD }}
          S_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          S_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          S_CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          S_CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          umask 077
          emit() {
            local v="$2"
            v="${v//\'/’}"
            printf "%s='%s'\n" "$1" "$v"
          }
          {
            emit ONLINE_MODE TRUE
            emit ENABLE_WHITELIST TRUE
            emit ENFORCE_WHITELIST TRUE
            # Compose derives the project name from this via the
            # project-directory .env - without it, the directory name
            # ("server") is used and a second stack collides with the
            # first deploy's containers.
            emit COMPOSE_PROJECT_NAME "${V_BRAND_SLUG:-server}"
            emit BRAND_NAME "$V_BRAND_NAME"
            emit BRAND_SLUG "$V_BRAND_SLUG"
            emit MOTD "$V_MOTD"
            emit DISCORD_INVITE_URL "$V_DISCORD_INVITE_URL"
            emit MC_VERSION "${V_MC_VERSION:-1.21.1}"
            emit SEED "$V_SEED"
            emit DOMAIN "$V_DOMAIN"
            emit SERVER_PORT "${V_SERVER_PORT:-25577}"
            emit MEMORY "${V_MEMORY:-5G}"
            emit VIEW_DISTANCE "${V_VIEW_DISTANCE:-10}"
            emit SIMULATION_DISTANCE "${V_SIMULATION_DISTANCE:-8}"
            emit SPAWN_X "$V_SPAWN_X"
            emit SPAWN_Y "$V_SPAWN_Y"
            emit SPAWN_Z "$V_SPAWN_Z"
            emit PREGEN_BORDER_RADIUS "${V_PREGEN_BORDER_RADIUS:-8192}"
            emit PLAYER_BORDER_RADIUS "${V_PLAYER_BORDER_RADIUS:-8192}"
            emit BACKUP_INTERVAL "${V_BACKUP_INTERVAL:-12h}"
            emit CLOUD_PROVIDER "${V_CLOUD_PROVIDER:-hetzner}"
            emit IMAGE_REGISTRY "${V_IMAGE_REGISTRY:-ghcr.io/piprees/minecraft-server-template}"
            emit STACK_VERSION "$V_STACK_VERSION"
            emit BRAND_ICON_URL "$V_BRAND_ICON_URL"
            emit DISCORD_ADMIN_ROLE_ID "$V_DISCORD_ADMIN_ROLE_ID"
            emit DISCORD_PLAYER_ROLE_ID "$V_DISCORD_PLAYER_ROLE_ID"
            emit RCON_PASSWORD "$S_RCON_PASSWORD"
            emit R2_ACCOUNT_ID "$S_R2_ACCOUNT_ID"
            emit R2_BUCKET "$S_R2_BUCKET"
            emit R2_ACCESS_KEY_ID "$S_R2_ACCESS_KEY_ID"
            emit R2_SECRET_ACCESS_KEY "$S_R2_SECRET_ACCESS_KEY"
            emit RESTIC_PASSWORD "$S_RESTIC_PASSWORD"
            emit DISCORD_BOT_TOKEN "$S_DISCORD_BOT_TOKEN"
            emit DISCORD_CHANNEL_ID "$S_DISCORD_CHANNEL_ID"
            emit DISCORD_CHAT_CHANNEL_ID "$S_DISCORD_CHAT_CHANNEL_ID"
            emit DISCORD_GUILD_ID "$S_DISCORD_GUILD_ID"
            emit DISCORD_WEBHOOK_URL "$S_DISCORD_WEBHOOK_URL"
            emit KUMA_API_KEY "$S_KUMA_API_KEY"
            emit KUMA_PASSWORD "$S_KUMA_PASSWORD"
            emit CLOUDFLARE_API_TOKEN "$S_CLOUDFLARE_API_TOKEN"
            emit CLOUDFLARE_ACCOUNT_ID "$S_CLOUDFLARE_ACCOUNT_ID"
            emit CLOUDFLARE_ZONE_ID "$S_CLOUDFLARE_ZONE_ID"
            emit CLOUDFLARE_TUNNEL_ID "$S_CLOUDFLARE_TUNNEL_ID"
          } > /tmp/.env.generated

          # Validate the real values, not the file - a quoted empty ('')
          # line would fool a grep-based check.
          MISSING=()
          [[ -z "$S_RCON_PASSWORD" ]] && MISSING+=(RCON_PASSWORD)
          [[ -z "$S_R2_ACCOUNT_ID" ]] && MISSING+=(R2_ACCOUNT_ID)
          [[ -z "$S_R2_BUCKET" ]] && MISSING+=(R2_BUCKET)
          [[ -z "$S_R2_ACCESS_KEY_ID" ]] && MISSING+=(R2_ACCESS_KEY_ID)
          [[ -z "$S_R2_SECRET_ACCESS_KEY" ]] && MISSING+=(R2_SECRET_ACCESS_KEY)
          [[ -z "$S_RESTIC_PASSWORD" ]] && MISSING+=(RESTIC_PASSWORD)
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Refusing to deploy: missing required values: ${MISSING[*]}"
            rm -f /tmp/.env.generated
            exit 1
          fi

          # The file must survive a shell source - catch quoting bugs HERE,
          # not on the server mid-deploy.
          bash -n /tmp/.env.generated
          ( set -a; . /tmp/.env.generated ) > /dev/null

      - name: Upload .env and sync overlay
        if: steps.tier.outputs.tier != 'pull'
        run: |
          HOST="${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }}"

          if [[ "${{ steps.tier.outputs.tier }}" == "full" ]]; then
            scp -i ~/.ssh/deploy_key /tmp/.env.generated "${HOST}:~/server/.env"
            rm -f /tmp/.env.generated
          fi

          if [[ -d overlay ]]; then
            rsync -a --delete -e "ssh -i ~/.ssh/deploy_key" \
              overlay/ "${HOST}:~/server/overlay/"
          fi

      - name: Update stack bundle
        if: steps.tier.outputs.tier != 'pull'
        # Pin the pull to the RESOLVED tag, not the symbolic input — the tier
        # decision above was made against that exact tag, and a release
        # published mid-run must not change what this deploy installs.
        # The puller lives in the bundle itself (scripts/stack-pull.sh);
        # for servers on a pre-v2.12.1 bundle, fetch the resolved tag's copy
        # from GitHub. The legacy root-level stack-pull.sh is removed.
        env:
          RESOLVED: ${{ steps.stack.outputs.resolved }}
        run: |
          HOST="${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }}"
          ssh -i ~/.ssh/deploy_key "$HOST" "RESOLVED='${RESOLVED}' bash -s" << 'EOF'
          set -euo pipefail
          cd ~/server
          rm -f stack-pull.sh
          PULLER=".stack/current/stack/scripts/stack-pull.sh"
          if [[ ! -f "$PULLER" ]]; then
            PULLER="$(mktemp)"
            curl -fsSL --connect-timeout 10 --max-time 60 \
              -o "$PULLER" \
              "https://raw.githubusercontent.com/piprees/minecraft-server-template/${RESOLVED}/scripts/stack-pull.sh"
          fi
          STACK_VERSION="$RESOLVED" bash "$PULLER"
          EOF

      - name: Full deploy (countdown + restart)
        if: steps.tier.outputs.tier == 'full'
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }} \
            "cd ~/server && DEPLOY_COMMIT='${{ steps.meta.outputs.sha }}' .stack/current/stack/scripts/deploy.sh --non-interactive"

      - name: Infra deploy (sidecars only, mc untouched)
        if: steps.tier.outputs.tier == 'infra'
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }} \
            'cd ~/server && .stack/current/stack/scripts/infra-deploy.sh'

      - name: Verify server health
        if: always() && steps.tier.outputs.tier == 'full'
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }}"

          echo "::group::Server container logs (last 80 lines)"
          $SSH 'sudo docker logs mc --tail 80 2>&1' || true
          echo "::endgroup::"

          HEALTH=$($SSH 'docker exec mc rcon-cli "list" 2>&1' || true)
          echo "RCON health check: $HEALTH"
          if echo "$HEALTH" | grep -q "players online"; then
            echo "Server is healthy"
          else
            echo "::error::Server failed to respond to RCON after deploy"
            echo "::group::Extended server logs (last 200 lines)"
            $SSH 'sudo docker logs mc --tail 200 2>&1' || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Update deployed state
        # Written before the pack rebuild so pack-build.sh can read
        # consumer_sha for the version string. success() only: recording
        # the sha after a FAILED deploy makes the next run diff against a
        # sha that never deployed and silently downgrade to pull tier.
        if: success() && steps.tier.outputs.tier != ''
        run: |
          ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }} \
            "printf 'consumer_sha=%s\nstack_version=%s\nstack_pin=%s\n' \
              '${{ steps.meta.outputs.full_sha }}' \
              '${{ steps.stack.outputs.resolved }}' \
              '${{ inputs.stack_version }}' \
              > ~/server/.deployed" || true

      - name: Rebuild modpack
        if: success() && steps.tier.outputs.tier != 'pull'
        continue-on-error: true
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }}"

          # Detect if pack inputs changed (controls Discord notification only).
          # Inputs: consumer overlay mod lists + the stack version (a stack
          # bump can change default mods). The pack manifest itself is baked
          # into the modpack-builder image, so the image tag rides along via
          # the stack version.
          MODS_CHANGED=$($SSH '
            cd ~/server
            NEW_HASH=$( (readlink .stack/current; cat overlay/mods-extra.txt overlay/mods-remove.txt 2>/dev/null) | sha256sum | cut -d" " -f1)
            OLD_HASH=$(cat modpack-dist/.modpack-hash 2>/dev/null || echo "none")
            if [ "$NEW_HASH" = "$OLD_HASH" ]; then echo "unchanged"; else echo "changed"; fi
          ')

          $SSH 'cd ~/server && .stack/current/stack/scripts/pack-build.sh' \
            || echo "::warning::Modpack build failed"

          if [ "$MODS_CHANGED" = "changed" ]; then
            $SSH 'cd ~/server && (readlink .stack/current; cat overlay/mods-extra.txt overlay/mods-remove.txt 2>/dev/null) | sha256sum | cut -d" " -f1 > modpack-dist/.modpack-hash'

            SHA="${{ steps.meta.outputs.sha }}"
            PACK_NAME=$($SSH "cd ~/server && . .env && echo \"\${BRAND_SLUG:-server}-\${MC_VERSION:-1.21.1}-v${SHA}\"")
            PLAYER_ROLE_ID="${{ vars.DISCORD_PLAYER_ROLE_ID }}"
            MSG="Modpack updated: **${PACK_NAME}**"
            [[ -n "$PLAYER_ROLE_ID" ]] && MSG="<@&${PLAYER_ROLE_ID}> ${MSG}"

            if [[ -n "$PLAYER_ROLE_ID" ]]; then
              PAYLOAD=$(echo "$MSG" | jq -Rs --arg rid "$PLAYER_ROLE_ID" \
                '{content: ., allowed_mentions: {roles: [$rid]}}')
            else
              PAYLOAD=$(echo "$MSG" | jq -Rs '{content: .}')
            fi

            # Post to the player chat channel (via bot API) so players see it.
            # Falls back to the admin webhook if DISCORD_CHAT_CHANNEL_ID is unset.
            CHAT_CHANNEL="${{ secrets.DISCORD_CHAT_CHANNEL_ID }}"
            if [[ -n "$CHAT_CHANNEL" && -n "${{ secrets.DISCORD_BOT_TOKEN }}" ]]; then
              curl -sf -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
                -H "Content-Type: application/json" -d "$PAYLOAD" \
                "https://discord.com/api/v10/channels/${CHAT_CHANNEL}/messages" || true
            else
              curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" \
                "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
            fi
          else
            echo "Mod content unchanged — page regenerated, no Discord notification"
          fi

      - name: Refresh kuma-init
        if: success() && steps.tier.outputs.tier != 'pull'
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DROPLET_HOST }} \
            'cd ~/server && docker compose --project-directory . -f .stack/current/stack/docker-compose.yml --profile cloud up -d --force-recreate --no-deps kuma-init'

      - name: Notify Discord (success)
        if: success()
        env:
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_ICON_URL: ${{ vars.BRAND_ICON_URL }}
        run: |
          TIER="${{ steps.tier.outputs.tier }}"
          SHA="${{ steps.meta.outputs.sha }}"
          MSG="${{ steps.meta.outputs.msg }}"
          JQ_ARGS=(--arg c "Deploy complete (**${TIER}**, \`${SHA}\`: ${MSG})")
          JQ_EXPR='{content: $c}'
          if [[ -n "$BRAND_NAME" ]]; then
            JQ_ARGS+=(--arg u "$BRAND_NAME"); JQ_EXPR="${JQ_EXPR%\}}, username: \$u}"
          fi
          if [[ -n "$BRAND_ICON_URL" ]]; then
            JQ_ARGS+=(--arg a "$BRAND_ICON_URL"); JQ_EXPR="${JQ_EXPR%\}}, avatar_url: \$a}"
          fi
          jq -n "${JQ_ARGS[@]}" "$JQ_EXPR" \
            | curl -sf -H "Content-Type: application/json" -d @- \
              "${{ secrets.DISCORD_WEBHOOK_URL }}" || true

      - name: Notify Discord (failure)
        if: failure()
        env:
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          BRAND_ICON_URL: ${{ vars.BRAND_ICON_URL }}
        run: |
          TIER="${{ steps.tier.outputs.tier }}"
          SHA="${{ steps.meta.outputs.sha }}"
          MSG="${{ steps.meta.outputs.msg }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ADMIN_ROLE_ID="${{ vars.DISCORD_ADMIN_ROLE_ID }}"
          CONTENT="Deploy **FAILED** (**${TIER}**, \`${SHA}\`: ${MSG})\n${URL}"
          [[ -n "$ADMIN_ROLE_ID" ]] && CONTENT="<@&${ADMIN_ROLE_ID}> ${CONTENT}"

          JQ_ARGS=()
          JQ_EXPR='{content: .}'
          if [[ -n "$BRAND_NAME" ]]; then
            JQ_ARGS+=(--arg u "$BRAND_NAME"); JQ_EXPR="${JQ_EXPR%\}}, username: \$u}"
          fi
          if [[ -n "$BRAND_ICON_URL" ]]; then
            JQ_ARGS+=(--arg a "$BRAND_ICON_URL"); JQ_EXPR="${JQ_EXPR%\}}, avatar_url: \$a}"
          fi

          if [[ -n "$ADMIN_ROLE_ID" ]]; then
            PAYLOAD=$(printf '%s' "$CONTENT" | jq -Rs "${JQ_ARGS[@]}" --arg rid "$ADMIN_ROLE_ID" \
              "${JQ_EXPR%\}}, allowed_mentions: {roles: [\$rid]}}")
          else
            PAYLOAD=$(printf '%s' "$CONTENT" | jq -Rs "${JQ_ARGS[@]}" "$JQ_EXPR")
          fi
          curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
