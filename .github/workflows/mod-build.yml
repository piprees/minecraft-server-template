name: Mod build

on:
  pull_request:
    paths:
      - 'mods/**'
  push:
    branches: [main]
    paths:
      - 'mods/**'

jobs:
  build-and-test:
    name: Build & test in-house mods
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'

      - name: Build & test
        working-directory: mods/custom-dimensions
        run: gradle build

      - name: Verify remapped JAR
        # remapJar can silently produce an empty jar (25-byte MANIFEST only)
        # on an incompatible Loom/Gradle pairing — catch it here, not on the
        # production server. The remapped jar must contain classes + refmap.
        working-directory: mods/custom-dimensions
        run: |
          JAR=$(find build/libs -name 'customdimensions-*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar')
          if [[ -z "$JAR" ]]; then
            echo "::error::No remapped jar found in build/libs"
            exit 1
          fi
          if ! unzip -l "$JAR" | grep -q 'customdimensions-refmap.json'; then
            echo "::error::$JAR is missing customdimensions-refmap.json — output is unremapped or empty"
            exit 1
          fi
          CLASSES=$(unzip -l "$JAR" | grep -c '\.class$' || true)
          if [[ "$CLASSES" -lt 10 ]]; then
            echo "::error::$JAR contains only $CLASSES classes — remapJar output looks empty"
            exit 1
          fi
          echo "OK: $JAR ($CLASSES classes, refmap present)"
