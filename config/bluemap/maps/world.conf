##                          ##
##         BlueMap          ##
##        Map-Config        ##
##                          ##

# Render bounds track PREGEN_BORDER_RADIUS (.env). deploy.sh
# templates these values on every deploy - edit PREGEN_BORDER_RADIUS, not
# these numbers. Chunky pre-generates to PREGEN_BORDER_RADIUS+2048 for
# Distant Horizons LODs, but the web map only covers the core area.
# BlueMap deletes tiles outside these bounds on its next update pass.

world: "world"
dimension: "minecraft:overworld"
name: "Overworld"
sorting: 0
sky-color: "#7dabff"
void-color: "#000000"
sky-light: 1
ambient-light: 0.1
remove-caves-below-y: 55
cave-detection-ocean-floor: -5
cave-detection-uses-block-light: false
min-x: -8192
max-x: 8192
min-z: -8192
max-z: 8192
min-inhabited-time: 0
render-edges: true
enable-perspective-view: false
enable-flat-view: true
enable-free-flight-view: false
enable-hires: false
storage: "file"
ignore-missing-light-data: false
marker-sets: {}
