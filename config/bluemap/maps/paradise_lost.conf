##                          ##
##         BlueMap          ##
##        Map-Config        ##
##                          ##

world: "world"
dimension: "paradise_lost:paradise_lost"
name: "Paradise Lost"
sorting: 300
sky-color: "#8ec2f0"
void-color: "#4a8abf"
sky-light: 1
ambient-light: 0.2
remove-caves-below-y: 55
cave-detection-ocean-floor: -5
cave-detection-uses-block-light: false
# Bounds match the Paradise Lost ChunkyBorder radius (deploy.sh).
min-x: -4096
max-x: 4096
min-z: -4096
max-z: 4096
min-inhabited-time: 0
render-edges: true
enable-perspective-view: true
enable-flat-view: true
enable-free-flight-view: false
enable-hires: true
storage: "file"
ignore-missing-light-data: false
marker-sets: {}
