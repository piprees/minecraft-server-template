##                          ##
##         BlueMap          ##
##        Map-Config        ##
##                          ##

# Render bounds track PREGEN_BORDER_RADIUS / 8 (.env). deploy.sh
# templates these values on every deploy. max-y: 90 cuts the nether roof
# so the map shows the interior - keep it when editing.

world: "world"
dimension: "minecraft:the_nether"
name: "The Nether"
sorting: 100
sky-color: "#290000"
void-color: "#150000"
sky-light: 1
ambient-light: 0.6
remove-caves-below-y: -10000
cave-detection-ocean-floor: -5
cave-detection-uses-block-light: false
min-x: -1024
max-x: 1024
min-z: -1024
max-z: 1024
max-y: 90
min-inhabited-time: 0
render-edges: true
enable-perspective-view: true
enable-flat-view: true
enable-free-flight-view: false
enable-hires: true
storage: "file"
ignore-missing-light-data: false
marker-sets: {}
