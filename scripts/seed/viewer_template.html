<!doctype html>
<meta charset="utf-8">
<title>Seed roll results</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #14161a; color: #e6e6e6; margin: 0; padding: 0 2rem 2rem;
}

h1 { font-size: 1.4rem; margin: 1rem 0 .3rem; }
.summary { color: #9aa; font-size: .85rem; margin: .2rem 0 .6rem; }
.summary b { color: #c8d2dc; font-weight: 600; }

/* --- Sticky filter/sort bar --- */
.filter-bar {
  position: sticky; top: 0; z-index: 100; background: #14161a;
  border-bottom: 1px solid #262b33; padding: .5rem 0;
  display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
}
.filter-bar select, .filter-bar input[type=text] {
  font: inherit; font-size: .82rem; background: #1d2026; color: #e6e6e6;
  border: 1px solid #2c313a; border-radius: 6px; padding: .25rem .5rem; outline: none;
}
.filter-bar select:focus, .filter-bar input[type=text]:focus { border-color: #5b8dd0; }
.filter-bar label {
  font-size: .82rem; color: #9aa; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: .25rem;
}
.family-btns { display: flex; gap: 0; }
.family-btn {
  font: inherit; font-size: .78rem; padding: .2rem .6rem;
  background: #1d2026; color: #9aa; border: 1px solid #2c313a;
  cursor: pointer; transition: background .12s, color .12s;
}
.family-btn:first-child { border-radius: 6px 0 0 6px; }
.family-btn:last-child { border-radius: 0 6px 6px 0; }
.family-btn + .family-btn { border-left: none; }
.family-btn.active { background: #2a3545; color: #8fb4d8; border-color: #5b8dd0; }
.family-btn:hover { background: #252a33; }

/* --- Winner card grid (grouped mode) --- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: .6rem; margin-top: .6rem;
}
.dim-card {
  background: #1d2026; border: 1px solid #2c313a; border-radius: 8px;
  padding: .5rem; cursor: pointer; transition: border-color .12s;
  position: relative; overflow: hidden; min-width: 0;
}
.dim-card:hover { border-color: #4a5568; }
.dim-card.expanded { border-color: #5b8dd0; grid-column: 1 / -1; cursor: default; }
.dim-card.hidden { display: none; }
.dim-card img {
  width: 100%; aspect-ratio: 1; border-radius: 4px; background: #101216;
  object-fit: cover; image-rendering: pixelated;
}
.dim-card.expanded img.winner-img { width: 200px; }
.dim-card .dim-name {
  font-size: .88rem; font-weight: 600; margin-top: .3rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dim-card .dim-meta {
  font-size: .72rem; color: #777; margin-top: .1rem;
  display: flex; gap: .4rem; align-items: center;
}
.dim-card .dim-score { font-weight: 700; font-size: 1rem; }
.dim-card .dim-spawn { font-size: .7rem; color: #9aa; margin-top: .15rem; }
.dim-card .dim-spawn b { color: #a8d8a0; font-weight: 600; }

/* Score colours */
.score-green { color: #5bd060; }
.score-default { color: #e6e6e6; }
.score-amber { color: #e8a735; }
.score-red { color: #e05252; }

/* Flag dot on card corner */
.flag-dot {
  position: absolute; top: .4rem; right: .4rem;
  width: 8px; height: 8px; border-radius: 50%;
}
.flag-dot.amber { background: #e8a735; }
.flag-dot.red { background: #e05252; }

/* Badge */
.badge {
  display: inline-block; font-size: .65rem; padding: .05rem .4rem;
  border-radius: 99px; background: #2c313a; color: #9aa;
}

/* --- Expanded detail panel --- */
.detail { display: none; margin-top: .6rem; }
.dim-card.expanded .detail { display: block; }
.dim-card.expanded .compact { display: none; }

.detail-header {
  display: flex; gap: 1rem; align-items: flex-start; margin-bottom: .6rem;
}
.detail-info { flex: 1; min-width: 0; }
.detail-info h2 { font-size: 1.1rem; margin: 0 0 .2rem; }
.detail-info .blurb { color: #bcd; font-size: .82rem; margin: .2rem 0; }
.detail-info .criteria {
  font-size: .75rem; color: #9aa; background: #191c21; border: 1px solid #262b33;
  border-radius: 6px; padding: .4rem .6rem; margin-top: .4rem;
}
.detail-info .criteria b { color: #c8d2dc; font-weight: 600; }

.dim-actions { margin: .5rem 0; }

/* --- Candidate cards --- */
.all-cands {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: .6rem; margin-top: .5rem;
}
.cand {
  background: #181b20; border: 1px solid #2c313a; border-radius: 8px;
  padding: .5rem; width: 100%; position: relative;
  overflow: hidden; min-width: 0;
}
.cand.winner { border-color: #d4a020; box-shadow: 0 0 0 1px #d4a020; }
.cand img {
  width: 100%; aspect-ratio: 1; border-radius: 4px; background: #101216;
  object-fit: cover; image-rendering: pixelated; display: block;
}
.cand .score { font-size: 1rem; font-weight: 700; }
.cand .seed {
  font-family: ui-monospace, monospace; font-size: .7rem;
  word-break: break-all; color: #8fb4d8;
}
.cand .cand-dim-label {
  font-size: .68rem; color: #777; margin-top: .15rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cand-detail {
  display: none; position: absolute; inset: 0; z-index: 10;
  background: rgba(24,27,32,.95); border-radius: 8px;
  padding: .5rem; overflow-y: auto;
}
.cand.show-detail .cand-detail { display: block; }
.cand-toggle {
  font-size: .65rem; color: #5b8dd0; cursor: pointer; margin-top: .2rem;
  user-select: none; display: inline-block;
}
.cand-toggle:hover { color: #8fb4d8; }
.bars { margin-top: .25rem; }
.bar {
  display: grid; grid-template-columns: 4.5rem 1fr 1.8rem; gap: .3rem;
  align-items: center; font-size: .68rem; color: #9aa; margin-bottom: .1rem;
}
.bar .track { height: 3px; background: #2c313a; border-radius: 2px; overflow: hidden; }
.bar .fill { height: 100%; background: #5b8dd0; }
.cand.winner .bar .fill { background: #d4a020; }
.spawn { font-size: .7rem; color: #9aa; margin-top: .2rem;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.spawn b { color: #a8d8a0; font-weight: 600; }

/* --- Buttons --- */
.pick, .action-btn {
  display: none; margin-top: .3rem; font-size: .7rem; padding: .18rem .5rem;
  border-radius: 5px; border: 1px solid #3a4150; background: #232833;
  color: #c8d2dc; cursor: pointer;
}
.pick:hover, .action-btn:hover { border-color: #d4a020; color: #ffd850; }
body.live .pick, body.live .action-btn { display: inline-block; }
.action-btn { margin-right: .2rem; }
.action-btn.reroll:hover { border-color: #5b8dd0; color: #8fb4d8; }
.action-btn.edit:hover { border-color: #5bd060; color: #a8d8a0; }

.close-btn {
  position: absolute; top: .4rem; right: .4rem; font-size: 1rem;
  color: #666; cursor: pointer; line-height: 1; padding: .2rem;
}
.close-btn:hover { color: #e6e6e6; }

/* Shortlisted candidate indicator */
.cand[data-shortlisted]::after {
  content: '\2605'; position: absolute; top: .3rem; right: .3rem;
  color: #d4a020; font-size: .85rem; line-height: 1;
}

/* Shortlist filter: hide non-shortlisted candidates when active */
body.shortlist-filter .cand:not([data-shortlisted]) { display: none; }

/* Ungrouped mode: flat grid of all candidates */
#ungrouped-grid {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: .6rem; margin-top: .6rem;
}
body.ungrouped #grid { display: none; }
body.ungrouped #ungrouped-grid { display: grid; }

/* Dim label hidden in grouped mode, visible in ungrouped */
.cand-dim-label { display: none; }
body.ungrouped .cand-dim-label { display: block; }

/* Hidden dimension cards */
.dim-card[data-hidden="1"] { opacity: .45; }
.dim-card[data-hidden="1"]:hover { opacity: .7; }

/* Extra action buttons */
.action-btn.hide:hover { border-color: #e8a735; color: #e8a735; }
.action-btn.remove { color: #c55; }
.action-btn.remove:hover { border-color: #e05252; color: #e05252; }
.action-btn.create-dim:hover { border-color: #8fb4d8; color: #8fb4d8; }

/* Create dimension dialog */
#create-dim-dialog {
  background: #1d2026; color: #e6e6e6; border: 1px solid #3a4150;
  border-radius: 10px; padding: 1.2rem; max-width: 380px; width: 90vw;
}
#create-dim-dialog::backdrop { background: rgba(0,0,0,.6); }
#create-dim-dialog h3 { margin: 0 0 .8rem; font-size: 1rem; }
#create-dim-dialog label {
  display: block; font-size: .82rem; color: #9aa; margin-bottom: .6rem;
}
#create-dim-dialog input[type=text], #create-dim-dialog textarea {
  display: block; width: 100%; margin-top: .2rem;
  font: inherit; font-size: .82rem; background: #14161a; color: #e6e6e6;
  border: 1px solid #2c313a; border-radius: 6px; padding: .35rem .5rem;
}
#create-dim-dialog textarea { height: 4rem; resize: vertical; }
#create-dim-dialog input:focus, #create-dim-dialog textarea:focus {
  border-color: #5b8dd0; outline: none;
}
.cd-error { color: #e05252; font-size: .75rem; min-height: 1.1em; margin-bottom: .3rem; }
.dialog-actions {
  display: flex; gap: .5rem; justify-content: flex-end; margin-top: .6rem;
}
.dialog-actions button {
  font: inherit; font-size: .8rem; padding: .3rem .8rem;
  border-radius: 6px; cursor: pointer; border: 1px solid #3a4150;
  background: #232833; color: #c8d2dc;
}
.dialog-actions button:hover { border-color: #5b8dd0; }
.dialog-actions .primary { background: #2a3545; color: #8fb4d8; }

/* --- Hires indicator --- */
.cand .hires-badge, .dim-card .hires-badge {
  position: absolute; top: .6rem; left: .6rem; font-size: .55rem;
  background: rgba(91,141,208,.85); color: #fff; padding: .1rem .3rem;
  border-radius: 3px; font-weight: 700; letter-spacing: .5px;
  pointer-events: none; display: none;
}
.cand .hires-badge.visible, .dim-card .hires-badge.visible { display: block; }

/* --- Image lightbox --- */
.cand img, img.winner-img { cursor: zoom-in; }
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.85); cursor: zoom-out;
  justify-content: center; align-items: center;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 95vw; max-height: 95vh; border-radius: 6px;
  image-rendering: pixelated; box-shadow: 0 0 40px rgba(0,0,0,.5);
}
</style>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="family-btns">{{FAMILY_BUTTONS}}</div>
  <select id="f-type">{{TYPE_OPTIONS}}</select>
  <select id="f-mood">{{MOOD_OPTIONS}}</select>
  <select id="f-sort">
    <option value="name">Sort: Name</option>
    <option value="score-desc">Sort: Score ↓</option>
    <option value="score-asc">Sort: Score ↑</option>
    <option value="family">Sort: Family</option>
    <option value="candidates">Sort: Candidates ↓</option>
  </select>
  <input id="f-search" type="text" placeholder="Search…" style="width:12rem">
  <label><input type="checkbox" id="f-flagged"> Flagged</label>
  <label><input type="checkbox" id="f-shortlisted"> Shortlisted</label>
  <label><input type="checkbox" id="f-ungrouped"> Ungrouped</label>
  <label><input type="checkbox" id="f-hidden"> Show hidden</label>
</div>

<h1>Multiverse seed roll — results</h1>
<p class="summary">{{SUMMARY_STATS}}</p>

<!-- Grouped mode: dimension cards -->
<div class="grid" id="grid">
{{DIMENSIONS_HTML}}
</div>

<!-- Ungrouped mode: flat candidate cards (populated by JS) -->
<div id="ungrouped-grid"></div>

<dialog id="create-dim-dialog">
  <h3>Create dimension</h3>
  <label>Name<input type="text" id="cd-name" required></label>
  <div class="cd-error" id="cd-name-error"></div>
  <label>Description<textarea id="cd-desc" maxlength="300"></textarea></label>
  <div class="dialog-actions">
    <button type="button" id="cd-cancel">Cancel</button>
    <button type="button" id="cd-create" class="primary">Create</button>
  </div>
  <input type="hidden" id="cd-parent-dim">
  <input type="hidden" id="cd-seed">
</dialog>

<div id="lightbox"><img></div>

<script>
(function() {
  var live = location.protocol !== 'file:';

  // --- Image lightbox (hires with fallback to normal) ---
  var lb = document.getElementById('lightbox');
  var lbImg = lb.querySelector('img');
  document.addEventListener('click', function(e) {
    var img = e.target.closest('.cand img, img.winner-img');
    if (img && img.closest('.compact')) img = null;
    if (img) {
      e.stopPropagation();
      var hires = img.dataset.hires;
      if (hires) {
        var probe = new Image();
        probe.onload = function() { lbImg.src = hires; };
        probe.onerror = function() { lbImg.src = img.src; };
        probe.src = hires;
      } else {
        lbImg.src = img.src;
      }
      lbImg.src = img.src;
      lb.classList.add('open');
    }
  });
  lb.addEventListener('click', function() { lb.classList.remove('open'); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lb.classList.contains('open')) lb.classList.remove('open');
  });
  if (live) document.body.classList.add('live');

  // --- Filter + sort state from URL hash ---
  function readHash() {
    var p = new URLSearchParams(location.hash.slice(1));
    return {
      family: p.get('family') || 'All', type: p.get('type') || '',
      mood: p.get('mood') || '', search: p.get('q') || '',
      flagged: p.get('flagged') === '1', shortlisted: p.get('shortlisted') === '1',
      ungrouped: p.get('ungrouped') === '1',
      showHidden: p.get('hidden') === '1', sort: p.get('sort') || 'name'
    };
  }
  function writeHash(s) {
    var p = new URLSearchParams();
    if (s.family !== 'All') p.set('family', s.family);
    if (s.type) p.set('type', s.type);
    if (s.mood) p.set('mood', s.mood);
    if (s.search) p.set('q', s.search);
    if (s.flagged) p.set('flagged', '1');
    if (s.shortlisted) p.set('shortlisted', '1');
    if (s.ungrouped) p.set('ungrouped', '1');
    if (s.showHidden) p.set('hidden', '1');
    if (s.sort !== 'name') p.set('sort', s.sort);
    history.replaceState(null, '', '#' + p.toString());
  }

  var state = readHash();
  var typeEl = document.getElementById('f-type');
  var moodEl = document.getElementById('f-mood');
  var sortEl = document.getElementById('f-sort');
  var searchEl = document.getElementById('f-search');
  var flaggedEl = document.getElementById('f-flagged');
  var shortlistedEl = document.getElementById('f-shortlisted');
  var ungroupedEl = document.getElementById('f-ungrouped');
  var hiddenEl = document.getElementById('f-hidden');
  var grid = document.getElementById('grid');
  var ugGrid = document.getElementById('ungrouped-grid');

  // Candidate sort comparator
  function candSort(a, b) {
    switch (state.sort) {
      case 'score-desc': return parseFloat(b.dataset.score || 0) - parseFloat(a.dataset.score || 0);
      case 'score-asc': return parseFloat(a.dataset.score || 0) - parseFloat(b.dataset.score || 0);
      case 'family': return (a.dataset.dim || '').localeCompare(b.dataset.dim || '');
      default: return (a.dataset.dim || '').localeCompare(b.dataset.dim || '')
                   || parseFloat(b.dataset.score || 0) - parseFloat(a.dataset.score || 0);
    }
  }

  function buildUngrouped() {
    ugGrid.innerHTML = '';
    var q = state.search.toLowerCase();
    // Collect all candidate cards, clone them into the ungrouped grid
    document.querySelectorAll('.dim-card').forEach(function(card) {
      var groups = (card.dataset.family || '').split(' ');
      var fam = state.family === 'All' || groups.indexOf(state.family) >= 0;
      var typ = !state.type || card.dataset.type === state.type;
      var moo = !state.mood || card.dataset.mood === state.mood;
      var txt = !q || card.dataset.name.toLowerCase().indexOf(q) >= 0;
      var hid = state.showHidden || card.dataset.hidden !== '1';
      if (!(fam && typ && moo && txt && hid)) return;

      card.querySelectorAll('.cand').forEach(function(c) {
        if (state.shortlisted && !c.dataset.shortlisted) return;
        if (state.flagged && parseFloat(c.dataset.score || 100) >= 70) return;
        var clone = c.cloneNode(true);
        clone.style.display = '';
        // Show dim label in ungrouped mode
        var lbl = clone.querySelector('.cand-dim-label');
        if (lbl) lbl.style.display = 'block';
        ugGrid.appendChild(clone);
      });
    });
    // Sort
    var items = Array.from(ugGrid.children);
    items.sort(candSort);
    items.forEach(function(el) { ugGrid.appendChild(el); });
  }

  function sortCandsInGroups() {
    document.querySelectorAll('.all-cands').forEach(function(container) {
      var items = Array.from(container.querySelectorAll('.cand'));
      items.sort(candSort);
      items.forEach(function(el) { container.appendChild(el); });
    });
  }

  function applyState() {
    document.querySelectorAll('.family-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.family === state.family);
    });
    typeEl.value = state.type;
    moodEl.value = state.mood;
    sortEl.value = state.sort;
    searchEl.value = state.search;
    flaggedEl.checked = state.flagged;
    shortlistedEl.checked = state.shortlisted;
    ungroupedEl.checked = state.ungrouped;
    hiddenEl.checked = state.showHidden;
    document.body.classList.toggle('shortlist-filter', state.shortlisted);
    document.body.classList.toggle('ungrouped', state.ungrouped);
    var q = state.search.toLowerCase();

    if (state.ungrouped) {
      buildUngrouped();
    } else {
      // Filter dim-cards
      var cards = Array.from(document.querySelectorAll('.dim-card'));
      cards.forEach(function(c) {
        var groups = (c.dataset.family || '').split(' ');
        var fam = state.family === 'All' || groups.indexOf(state.family) >= 0;
        var typ = !state.type || c.dataset.type === state.type;
        var moo = !state.mood || c.dataset.mood === state.mood;
        var txt = !q || c.dataset.name.toLowerCase().indexOf(q) >= 0;
        var flg = !state.flagged || c.dataset.flagged === '1';
        var shl = !state.shortlisted || c.querySelector('.cand[data-shortlisted]') !== null;
        var hid = state.showHidden || c.dataset.hidden !== '1';
        c.classList.toggle('hidden', !(fam && typ && moo && txt && flg && shl && hid));
      });
      // Sort dim-cards
      var visible = cards.filter(function(c) { return !c.classList.contains('hidden'); });
      visible.sort(function(a, b) {
        switch (state.sort) {
          case 'score-desc': return parseFloat(b.dataset.score) - parseFloat(a.dataset.score);
          case 'score-asc': return parseFloat(a.dataset.score) - parseFloat(b.dataset.score);
          case 'family': return (a.dataset.family || '').localeCompare(b.dataset.family || '') || a.dataset.name.localeCompare(b.dataset.name);
          case 'candidates': return parseInt(b.dataset.cands) - parseInt(a.dataset.cands);
          default: return a.dataset.name.localeCompare(b.dataset.name);
        }
      });
      visible.forEach(function(c) { grid.appendChild(c); });
      // Sort candidates within expanded dim groups
      sortCandsInGroups();
    }
    writeHash(state);
  }

  document.querySelectorAll('.family-btn').forEach(function(b) {
    b.addEventListener('click', function() { state.family = b.dataset.family; applyState(); });
  });
  typeEl.addEventListener('change', function() { state.type = typeEl.value; applyState(); });
  moodEl.addEventListener('change', function() { state.mood = moodEl.value; applyState(); });
  sortEl.addEventListener('change', function() { state.sort = sortEl.value; applyState(); });
  searchEl.addEventListener('input', function() { state.search = searchEl.value; applyState(); });
  flaggedEl.addEventListener('change', function() { state.flagged = flaggedEl.checked; applyState(); });
  shortlistedEl.addEventListener('change', function() { state.shortlisted = shortlistedEl.checked; applyState(); });
  ungroupedEl.addEventListener('change', function() { state.ungrouped = ungroupedEl.checked; applyState(); });
  hiddenEl.addEventListener('change', function() { state.showHidden = hiddenEl.checked; applyState(); });
  applyState();

  // --- Hi-res image upgrade + HD badge ---
  document.querySelectorAll('img[data-hires]').forEach(function(img) {
    var hi = new Image();
    hi.onload = function() {
      img.src = hi.src;
      var badge = img.parentElement.querySelector('.hires-badge');
      if (badge) badge.classList.add('visible');
    };
    hi.src = img.dataset.hires;
  });

  // --- Card expand/collapse ---
  grid.addEventListener('click', function(e) {
    if (e.target.closest('.action-btn, .pick, .close-btn, .cand')) return;
    var card = e.target.closest('.dim-card');
    if (!card) return;
    if (card.classList.contains('expanded')) return;
    document.querySelectorAll('.dim-card.expanded').forEach(function(c) { c.classList.remove('expanded'); });
    card.classList.add('expanded');
    sortCandsInGroups();
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  grid.addEventListener('click', function(e) {
    var close = e.target.closest('.close-btn');
    if (close) { close.closest('.dim-card').classList.remove('expanded'); }
  });

  // --- Candidate detail toggle ---
  document.addEventListener('click', function(e) {
    var tog = e.target.closest('.cand-toggle');
    if (tog) {
      e.stopPropagation();
      tog.closest('.cand').classList.toggle('show-detail');
      tog.textContent = tog.closest('.cand').classList.contains('show-detail') ? 'less' : 'more';
    }
  });

  // --- Action buttons (live server only) ---
  if (!live) return;

  function postJSON(url, data) {
    return fetch(url, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    }).catch(function() { return null; });
  }

  // Delegate clicks on both grids
  function handleAction(e) {
    var pick = e.target.closest('.pick');
    if (pick) {
      pick.disabled = true; pick.textContent = 'saving…';
      postJSON('/pick', {dim: pick.dataset.dim, seed: pick.dataset.seed}).then(function(res) {
        if (res && res.ok) location.reload();
        else { pick.disabled = false; pick.textContent = 'pick (failed)'; }
      });
      return;
    }
    var reroll = e.target.closest('.action-btn.reroll');
    if (reroll) {
      reroll.disabled = true; reroll.textContent = 'Rolling…';
      postJSON('/reroll', {dim: reroll.dataset.dim, pool: 5000, count: 100}).then(function(res) {
        if (res && res.ok) res.json().then(function(d) { pollJob(d.job_id, reroll); });
        else { reroll.disabled = false; reroll.textContent = 'Re-roll (failed)'; }
      });
      return;
    }
    var edit = e.target.closest('.action-btn.edit');
    if (edit) {
      edit.disabled = true; edit.textContent = 'Opening…';
      postJSON('/edit-config', {dim: edit.dataset.dim}).then(function(res) {
        edit.textContent = (res && res.ok) ? 'Opened' : 'Failed';
        setTimeout(function() { edit.disabled = false; edit.textContent = 'Edit'; }, 2500);
      });
      return;
    }
    var createDim = e.target.closest('.action-btn.create-dim');
    if (createDim) {
      var dlg = document.getElementById('create-dim-dialog');
      document.getElementById('cd-parent-dim').value = createDim.dataset.dim;
      document.getElementById('cd-seed').value = createDim.dataset.seed;
      document.getElementById('cd-name').value = createDim.dataset.dim + '_fork';
      document.getElementById('cd-desc').value = '';
      document.getElementById('cd-name-error').textContent = '';
      document.getElementById('cd-create').disabled = false;
      document.getElementById('cd-create').textContent = 'Create';
      dlg.showModal();
      return;
    }
    var hideBtn = e.target.closest('.action-btn.hide');
    if (hideBtn) {
      hideBtn.disabled = true; hideBtn.textContent = 'Hiding…';
      postJSON('/hide-dimension', {dim: hideBtn.dataset.dim}).then(function(res) {
        if (res && res.ok) location.reload();
        else { hideBtn.disabled = false; hideBtn.textContent = 'Hide (failed)'; }
      });
      return;
    }
    var removeBtn = e.target.closest('.action-btn.remove');
    if (removeBtn) {
      if (!confirm('Remove "' + removeBtn.dataset.dim + '"?')) return;
      removeBtn.disabled = true; removeBtn.textContent = 'Removing…';
      postJSON('/remove-dimension', {dim: removeBtn.dataset.dim}).then(function(res) {
        if (res && res.ok) location.reload();
        else { removeBtn.disabled = false; removeBtn.textContent = 'Remove (failed)'; }
      });
      return;
    }
    var slBtn = e.target.closest('.action-btn.shortlist');
    if (slBtn) {
      var cand = slBtn.closest('.cand');
      var isShortlisted = cand.dataset.shortlisted === '1';
      slBtn.disabled = true;
      slBtn.textContent = isShortlisted ? 'Removing…' : 'Shortlisting…';
      postJSON('/shortlist', {dim: slBtn.dataset.dim, seed: slBtn.dataset.seed, action: isShortlisted ? 'remove' : 'add'}).then(function(res) {
        if (!res || !res.ok) { slBtn.disabled = false; slBtn.textContent = 'Failed'; return; }
        return res.json();
      }).then(function(data) {
        if (!data) return;
        if (data.shortlisted) {
          cand.dataset.shortlisted = '1';
          slBtn.textContent = 'Unshortlist';
          if (data.hires) {
            var img = cand.querySelector('img');
            if (img) { img.src = data.hires; }
          }
        } else {
          delete cand.dataset.shortlisted;
          slBtn.textContent = 'Shortlist';
        }
        slBtn.disabled = false;
      });
      return;
    }
  }
  grid.addEventListener('click', handleAction);
  ugGrid.addEventListener('click', handleAction);

  function pollJob(id, btn) {
    var iv = setInterval(function() {
      fetch('/job/' + id).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === 'done') { clearInterval(iv); btn.textContent = 'Done'; setTimeout(function() { location.reload(); }, 800); }
        else if (d.status === 'failed') { clearInterval(iv); btn.disabled = false; btn.textContent = 'Re-roll (failed)'; }
        else { btn.textContent = 'Rolling… ' + (d.elapsed || '') + 's'; }
      }).catch(function() {});
    }, 2000);
  }

  // --- Create dimension modal ---
  document.getElementById('cd-cancel').addEventListener('click', function() {
    document.getElementById('create-dim-dialog').close();
  });
  document.getElementById('cd-create').addEventListener('click', function() {
    var nameEl = document.getElementById('cd-name');
    var descEl = document.getElementById('cd-desc');
    var errEl = document.getElementById('cd-name-error');
    var name = nameEl.value.trim();
    if (!/^[a-z][a-z0-9_]*$/.test(name)) {
      errEl.textContent = 'Must be snake_case: start with a letter, only a-z, 0-9, _';
      return;
    }
    errEl.textContent = '';
    var btn = document.getElementById('cd-create');
    btn.disabled = true; btn.textContent = 'Creating…';
    postJSON('/create-dimension', {
      parent_dim: document.getElementById('cd-parent-dim').value,
      seed: document.getElementById('cd-seed').value,
      name: name,
      description: descEl.value.trim()
    }).then(function(res) {
      if (!res || !res.ok) return res && res.json ? res.json() : null;
      return res.json();
    }).then(function(data) {
      if (data && data.ok) {
        document.getElementById('create-dim-dialog').close();
        location.reload();
      } else {
        errEl.textContent = (data && data.error) || 'Failed';
        btn.disabled = false; btn.textContent = 'Create';
      }
    });
  });
})();
</script>
